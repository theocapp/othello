name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: othello
          POSTGRES_PASSWORD: othello
          POSTGRES_DB: othello_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run backend smoke and wiring tests
        env:
          OTHELLO_INTERNAL_SCHEDULER: 'false'
          OTHELLO_PGHOST: localhost
          OTHELLO_PGPORT: '5432'
          OTHELLO_PGDATABASE: othello_test
          OTHELLO_TEST_PGDATABASE: othello_test
          OTHELLO_PGUSER: othello
          OTHELLO_PGPASSWORD: othello
        run: python -m unittest test_api_smoke test_runtime_wiring test_ingestion -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm install
      - name: Build frontend
        run: npm run build
